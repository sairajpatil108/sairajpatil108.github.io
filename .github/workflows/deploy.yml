name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to main.
  push:
    branches: [main]
  # Allow a manual run from the Actions tab.
  workflow_dispatch:

# Least-privilege token: read the repo, write Pages, mint an OIDC token for deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Don't cancel an in-flight deploy — let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
