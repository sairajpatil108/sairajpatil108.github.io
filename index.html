<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0078d7;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #005a9e;
        }
    </style>
</head>

<body>
    <button id="downloadBtn">Download Windows Files</button>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function () {
            // Create a link to the zip file
            const a = document.createElement("a");
            a.href = "windows.zip"; // This assumes you've zipped your windows folder
            a.download = "windows.zip";
            document.body.appendChild(a);
            a.click();
            setTimeout(function () {
                document.body.removeChild(a);
            }, 0);
        });
    </script>
</body>

</html>
